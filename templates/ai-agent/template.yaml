apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ai-agent
  title: AI Agent (Platform Standard)
  description: |
    Create a production-ready AI agent with
    Terraform infra, CI/CD, EKS deployment, and observability
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Agent Details
      required:
        - agent_name
        - owner
        - model_name
      properties:
        agent_name:
          title: Agent Name
          type: string
          description: Lowercase, kebab-case (e.g. agent-chatbot)
          pattern: '^[a-z][a-z0-9-]+$'
        owner:
          title: Owning Team
          type: string
          description: Team responsible for this agent
        model_name:
          title: Bedrock Model
          type: string
          enum:
            - anthropic.claude-v2
            - amazon.titan-text
            - llama2
        environment:
          title: Environment
          type: string
          default: dev
          enum: [dev, staging, prod]

  steps:
    - id: fetch
      name: Generate agent repository skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          agent_name: ${{ parameters.agent_name }}
          owner: ${{ parameters.owner }}
          model_name: ${{ parameters.model_name }}
          environment: ${{ parameters.environment }}

    - id: publish
      name: Create GitHub repository
      action: publish:github
      input:
        repoUrl: github.com/<YOUR_ORG>/${{ parameters.agent_name }}
        defaultBranch: main
        description: AI agent ${{ parameters.agent_name }}

    - id: pull-request
      name: Create platform bootstrap PR
      action: github:pull-request
      input:
        repoUrl: github.com/<YOUR_ORG>/${{ parameters.agent_name }}
        branchName: platform/bootstrap
        title: "chore: bootstrap AI agent platform setup"
        description: |
          This PR was automatically generated by Backstage.
          It provisions:
          - Terraform infrastructure
          - CI/CD pipelines
          - EKS deployment config
          - Observability and IAM

    - id: register
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open Pull Request
        url: ${{ steps.pull-request.output.pullRequestUrl }}
